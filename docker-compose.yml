name: plantogether

networks:
  plantogether-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
  keycloak-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # Traefik — reverse proxy, routes /api/v1/* to the correct microservice
  # Dashboard: http://localhost:8080
  # ─────────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    profiles: [essential]
    container_name: plantogether-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plantogether-network

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — 8 bases isolées (une par microservice)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [essential]
    container_name: plantogether-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - plantogether-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ─────────────────────────────────────────────────────────────────────────────
  # RabbitMQ — broker d'événements asynchrones (Topic Exchange)
  # ─────────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    profiles: [essential]
    container_name: plantogether-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - plantogether-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — cache applicatif + rate limiting (Bucket4j)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: [essential]
    container_name: plantogether-redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - plantogether-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO — stockage objet compatible S3 (images, justificatifs, avatars)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    profiles: [essential]
    container_name: plantogether-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - plantogether-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Création automatique du bucket plantogether au démarrage
  minio-init:
    image: minio/mc:latest
    profiles: [essential]
    container_name: plantogether-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - plantogether-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/plantogether;
      mc anonymous set none local/plantogether;
      echo 'Bucket plantogether ready.';
      "
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # MONITORING (profil optionnel)
  # ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    container_name: plantogether-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - plantogether-network

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    container_name: plantogether-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - plantogether-network
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    profiles: [monitoring]
    container_name: plantogether-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - plantogether-network

  tempo:
    image: grafana/tempo:latest
    profiles: [monitoring]
    container_name: plantogether-tempo
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC (traces depuis les microservices)
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - plantogether-network

  promtail:
    image: grafana/promtail:latest
    profiles: [monitoring]
    container_name: plantogether-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - plantogether-network
    depends_on:
      - loki
