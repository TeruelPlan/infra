apiVersion: v1
kind: Service
metadata:
  name: {{ include "plantogether-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plantogether-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.grpc.enabled }}
    - name: grpc
      port: {{ .Values.grpc.port }}
      targetPort: grpc
      protocol: TCP
    {{- end }}
  selector:
    {{- include "plantogether-service.selectorLabels" . | nindent 4 }}
