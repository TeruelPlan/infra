# kube-prometheus-stack (Prometheus + Grafana)
grafana:
  adminPassword: ""  # from secret
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.plantogether.com
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.monitoring:9090
        - name: Loki
          type: loki
          url: http://loki.monitoring:3100
        - name: Tempo
          type: tempo
          url: http://tempo.monitoring:3200

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 20Gi
